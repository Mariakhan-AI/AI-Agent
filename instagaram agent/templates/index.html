<!DOCTYPE html>
<html>
<head>
    <title>CaptionCraft ✨</title>
</head>
<body>
    <h1>Instagram Caption Generator</h1>
    <form id="captionForm">
        <input type="text" name="prompt" placeholder="What's your post about?" required>
        <input type="text" name="niche" placeholder="Your niche (e.g. travel, tech)" required>
        <button type="submit">Generate</button>
    </form>
    <p id="result"></p>

    <script>
        const form = document.getElementById("captionForm");
        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                prompt: form.prompt.value,
                niche: form.niche.value
            };
            const res = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            document.getElementById("result").innerText = json.caption || json.error;
        };
    </script>
</body>
</html>
